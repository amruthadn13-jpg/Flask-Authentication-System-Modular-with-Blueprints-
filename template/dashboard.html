
<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .box {
            margin-top: 100px;
            padding: 30px;
            background: white;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        button {
            padding: 10px 20px;
            background-color: red;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: darkred;
        }
    </style>
</head>

<body>

<div class="box">

    <!-- FLASH MESSAGES -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <p style="color:
                    {% if category == 'error' %} red
                    {% else %} green
                    {% endif %}
                ">
                    {{ message }}
                </p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <h1>Welcome {{ user }} 🎉</h1>

    <a href="/logout">
        <button>Logout</button>
    </a>

</div>

</body>
</html>
